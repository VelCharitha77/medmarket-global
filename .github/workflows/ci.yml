name: CI — Lint & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check engine/ agent/ connectors/ --ignore E501

  test-engine:
    name: Engine Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install psycopg2-binary
      - run: PYTHONPATH=. python tests/test_engine.py

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t test-npi connectors/npi_registry/
      - run: docker build -t test-hubspot connectors/hubspot_crm/
      - run: docker build -t test-hr connectors/hr/
      - run: docker build -t test-calls connectors/call_center/
      - run: docker build -t test-fx connectors/region_fx/
      - run: docker build -t test-ehr connectors/ehr/
      - run: docker build -t test-ehr-api connectors/ehr_mock_api/

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: cd infra && terraform init
      - run: cd infra && terraform plan -var-file=envs/dev.tfvars -var="db_password=ci-placeholder"
